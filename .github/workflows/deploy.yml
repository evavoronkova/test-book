name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Устанавливаем актуальный mdBook и совместимый форк плагина KaTeX
      - name: Install mdBook and mdbook-katex
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook,mdbook-katex-scaled

      # Переименовываем бинарник форка, чтобы mdBook вызывал его по стандартному имени katex
      - name: Link plugin name
        run: |
          sudo ln -s $(which mdbook-katex-scaled) /usr/local/bin/mdbook-katex

      - name: Build mdBook
        run: mdbook build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './book'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4





