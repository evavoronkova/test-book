name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Установка Rust и cargo-binstall для быстрой загрузки бинарников
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall
        "run": curl -L --proto '=https' --tlsv1.2 -sSf https://githubusercontent.com | sh

      # Быстрая установка mdBook и mdbook-katex с автоматическим выставлением прав +x
      - name: Install mdBook and KaTeX plugin
        "run": |
          cargo binstall --no-confirm mdbook
          cargo binstall --no-confirm mdbook-katex

      - name: Build mdBook
        "run": mdbook build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './book'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


